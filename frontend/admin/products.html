<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotton Street — Manage Products</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f2ee;
    --accent: #c8a96e;
    --accent2: #e63946;
    --grey: #1a1a1a;
    --mid: #2a2a2a;
    --light: #888;
    --green: #25D366;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; }

  /* NAV */
  nav {
    background: var(--grey);
    border-bottom: 1px solid rgba(200,169,110,0.15);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-brand { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--white); }
  .nav-brand span { color: var(--accent); }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a { color: var(--light); text-decoration: none; font-size: 14px; font-family: 'Space Mono', monospace; transition: color 0.3s; }
  .nav-links a.active, .nav-links a:hover { color: var(--accent); }
  .btn-logout { background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--white); padding: 6px 12px; font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer; transition: 0.3s; }
  .btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }

  /* MAIN LAYOUT */
  .container { display: flex; min-height: calc(100vh - 69px); }
  
  /* FORM PANEL */
  .form-panel {
    width: 380px;
    background: var(--grey);
    border-right: 1px solid rgba(200,169,110,0.1);
    padding: 32px;
    overflow-y: auto;
    height: calc(100vh - 69px);
  }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: var(--accent); margin-bottom: 24px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--light); margin-bottom: 8px; }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--black);
    border: 1px solid var(--mid);
    color: var(--white);
    padding: 12px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: 0.3s;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  
  /* PHOTO UPLOAD BOX */
  .photo-upload-box {
    border: 2px dashed var(--mid);
    background: var(--black);
    padding: 24px;
    text-align: center;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
  }
  .photo-upload-box:hover { border-color: var(--accent); }
  .photo-upload-box span { display: block; font-size: 24px; margin-bottom: 8px; }
  .photo-upload-box p { font-size: 12px; color: var(--light); }
  #imgPreview { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; margin-top: 12px; display: none; }
  .upload-progress { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 8px; display: none; }

  /* LIST PANEL */
  .list-panel { flex: 1; padding: 40px; overflow-y: auto; height: calc(100vh - 69px); }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .panel-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }
  .panel-title span { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--light); margin-left: 12px; }
  .search-bar { width: 300px; position: relative; }
  .search-bar input { width: 100%; background: var(--grey); border: 1px solid var(--mid); padding: 10px 16px; color: var(--white); font-size: 14px; border-radius: 4px; }
  .search-bar input:focus { outline: none; border-color: var(--accent); }

  /* PRODUCT ROW */
  .product-list { display: flex; flex-direction: column; gap: 12px; }
  .product-row {
    background: var(--grey);
    border: 1px solid rgba(255,255,255,0.02);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-radius: 4px;
    transition: 0.3s;
  }
  .product-row:hover { border-color: rgba(200,169,110,0.2); }
  .product-row.editing { border-color: var(--accent); background: rgba(200,169,110,0.02); }
  .product-thumb { width: 48px; height: 48px; border-radius: 4px; background: var(--black); display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: 'Space Mono', monospace; font-size: 14px; color: var(--accent); }
  .product-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .product-info { flex: 1; }
  .product-name { font-weight: 500; font-size: 16px; margin-bottom: 4px; }
  .product-meta { font-size: 12px; color: var(--light); }
  .product-price { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent); font-weight: bold; margin-top: 4px; }
  
  .product-actions { display: flex; gap: 8px; }
  .product-actions button { border: none; padding: 8px 16px; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.3s; }
  .btn-edit { background: var(--mid); color: var(--white); }
  .btn-edit:hover { background: #3a3a3a; }
  .btn-delete { background: rgba(230,57,70,0.1); color: var(--accent2); }
  .btn-delete:hover { background: var(--accent2); color: var(--white); }
  .stock-toggle { background: var(--black); border: 1px solid var(--mid) !important; font-size: 14px; width: 36px; padding: 0 !important; display: flex; align-items: center; justify-content: center; }

  /* SAVE BUTTON */
  .btn-save { width: 100%; background: var(--accent); color: var(--black); border: none; padding: 14px; border-radius: 4px; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
  .btn-save:hover { background: #bda066; }
  .btn-save:disabled { background: var(--mid); color: var(--light); cursor: not-allowed; }

  /* TOAST */
  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--grey); border: 1px solid var(--accent); color: var(--white); padding: 16px 24px; border-radius: 4px; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; transform: translateY(20px); transition: 0.3s; pointer-events: none; z-index: 1000; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--accent2); }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">COTTON STREET<span>.ADMIN</span></div>
  <div class="nav-links">
    <a href="orders.html">ORDERS</a>
    <a href="products.html" class="active">PRODUCTS</a>
    <button class="btn-logout" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<div class="container">
  <div class="form-panel">
    <div class="form-title" id="formTitle">ADD PRODUCT</div>
    <input type="hidden" id="editId">
    
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" id="pName" placeholder="e.g. Nike Air Max 95">
    </div>

    <div class="form-group">
      <label>Variant / Description</label>
      <input type="text" id="pVariant" placeholder="e.g. Black · All Sizes on Order">
    </div>

    <div class="form-group">
      <label>Price (BWP)</label>
      <input type="number" id="pPrice" placeholder="e.g. 1850">
    </div>

    <div class="form-group">
      <label>Old Price (BWP - Optional)</label>
      <input type="number" id="pOldPrice" placeholder="e.g. 2400">
    </div>

    <div class="form-group">
      <label>Category</label>
      <select id="pCategory">
        <option value="">Select category…</option>
      </select>
    </div>

    <div class="form-group">
      <label>Promo Badge (Optional)</label>
      <select id="pBadge">
        <option value="">None</option>
        <option value="NEW">NEW</option>
        <option value="HOT">HOT</option>
        <option value="SALE">SALE</option>
        <option value="TRENDING">TRENDING</option>
        <option value="BESTSELLER">BESTSELLER</option>
      </select>
    </div>

    <div class="form-group">
      <label>Product Image</label>
      <div class="photo-upload-box" id="uploadArea">
        <span>📸</span>
        <p>Drag & drop image here or click to browse</p>
        <img id="imgPreview" alt="Upload preview">
        <div class="upload-progress" id="uploadProgress">Uploading…</div>
      </div>
      <input type="file" id="imgFile" accept="image/*" style="display: none;" onchange="handleImageSelect(this)">
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveProduct()">SAVE PRODUCT</button>
    <button class="btn-edit" id="cancelBtn" style="width: 100%; margin-top: 10px; padding: 12px; font-family: 'Space Mono', monospace; font-size: 12px; display: none;" onclick="clearForm()">CANCEL</button>
  </div>

  <div class="list-panel">
    <div class="panel-header">
      <div class="panel-title">ALL PRODUCTS <span id="productCount">0 products</span></div>
      <div class="search-bar">
        <input type="text" placeholder="Search by name or info…" oninput="searchProducts(this.value)">
      </div>
    </div>

    <div class="product-list" id="productList">
      </div>
  </div>
</div>

<div class="toast" id="toast">Product added successfully</div>

<script type="module">
import { classifyProductName, compressImage } from '../js/admin/admin-intel.js';

/* ===== CONFIG ===== */
const API = (() => {
  const host = window.location.hostname;
  if (host.endsWith('.app.github.dev')) {
    return `${window.location.protocol}//${host.replace(/-\d+\.app\.github\.dev$/, '-8000.app.github.dev')}/api`;
  }
  return 'http://localhost:8000/api';
})();

const token = localStorage.getItem('cs_token');
if (!token) window.location.href = 'login.html';

const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

let allProducts = [];
let categories = [];
let uploadedImageUrl = '';
let uploadedPublicId = '';
let activeCompressedFile = null; // Stores our optimized image

/* ===== INIT ===== */
async function init() {
  await loadCategories();
  await loadProducts();
  setupDragAndDrop();
  setupNLPAssistant();
}

/* ===== NLP SMART FILL ===== */
function setupNLPAssistant() {
  const pNameInput = document.getElementById('pName');
  const pVariantInput = document.getElementById('pVariant');
  const pCategorySelect = document.getElementById('pCategory');
  const pBadgeSelect = document.getElementById('pBadge');

  if (!pNameInput) return;

  // Real-time listener checking what the admin user is typing
  pNameInput.addEventListener('input', (e) => {
    const prediction = classifyProductName(e.target.value);
    if (prediction) {
      // 1. Auto-assign corresponding Category option
      if (pCategorySelect) {
        for (let option of pCategorySelect.options) {
          if (option.text.toLowerCase().includes(prediction.category) || option.value === prediction.category) {
            pCategorySelect.value = option.value;
            break;
          }
        }
      }
      
      // 2. Auto-set high converting Badge if empty
      if (pBadgeSelect && pBadgeSelect.value === "") {
        pBadgeSelect.value = prediction.suggestedBadge;
      }

      // 3. Auto-draft matching Variant if currently empty
      if (pVariantInput && !pVariantInput.value.trim()) {
        pVariantInput.value = prediction.defaultVariant;
      }
    }
  });
}

/* ===== DRAG AND DROP OPTIMIZATION ===== */
function setupDragAndDrop() {
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('imgFile');

  if (!uploadArea || !fileInput) return;

  // Let the admin click the area to prompt standard browser picker
  uploadArea.addEventListener('click', () => fileInput.click());

  ['dragenter', 'dragover'].forEach(eventName => {
    uploadArea.addEventListener(eventName, (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = 'var(--accent)';
      uploadArea.style.background = 'rgba(200,169,110,0.05)';
    }, false);
  });

  ['dragleave', 'drop'].forEach(eventName => {
    uploadArea.addEventListener(eventName, (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '';
      uploadArea.style.background = '';
    }, false);
  });

  uploadArea.addEventListener('drop', async (e) => {
    const dt = e.dataTransfer;
    const files = dt.files;
    if (files.length) {
      fileInput.files = files; 
      await handleImageSelect(fileInput);
    }
  });
}

async function loadCategories() {
  try {
    const res = await fetch(`${API}/categories`);
    categories = await res.json();
    const sel = document.getElementById('pCategory');
    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch (e) { showToast('Failed to load categories', true); }
}

async function loadProducts() {
  try {
    const res = await fetch(`${API}/products`);
    allProducts = await res.json();
    renderProducts(allProducts);
  } catch (e) { showToast('Failed to load products', true); }
}

/* ===== RENDER ===== */
function renderProducts(list) {
  document.getElementById('productCount').textContent = `${list.length} products`;
  const container = document.getElementById('productList');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty-list">No products found</div>';
    return;
  }
  container.innerHTML = list.map(p => {
    const thumb = p.image_url
      ? `<div class="product-thumb"><img src="${p.image_url}" alt="${p.name}"></div>`
      : `<div class="product-thumb">${p.name.slice(0,2).toUpperCase()}</div>`;
    const catName = categories.find(c => c.id === p.category_id)?.name || '—';
    return `
    <div class="product-row" id="row-${p.id}">
      ${thumb}
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-meta">${catName} · ${p.variant || '—'}</div>
        <div class="product-price">P${Number(p.price).toLocaleString()}${p.old_price ? ` <span style="text-decoration:line-through;color:var(--light);font-size:11px;">P${Number(p.old_price).toLocaleString()}</span>` : ''}</div>
      </div>
      <div class="product-actions">
        <button class="stock-toggle" onclick="toggleStock(${p.id}, ${p.in_stock})" title="${p.in_stock ? 'In Stock' : 'Out of Stock'}">${p.in_stock ? '✅' : '❌'}</button>
        <button class="btn-edit" onclick="editProduct(${p.id})">Edit</button>
        <button class="btn-delete" onclick="deleteProduct(${p.id}, '${p.name.replace(/'/g, "\\'")}')">Del</button>
      </div>
    </div>`;
  }).join('');
}

window.searchProducts = function(q) {
  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase()) ||
    (p.variant || '').toLowerCase().includes(q.toLowerCase())
  );
  renderProducts(filtered);
}

/* ===== IMAGE UPLOAD (COMPRESSED) ===== */
window.handleImageSelect = async function(input) {
  const file = input.files[0];
  if (!file) return;

  const progress = document.getElementById('uploadProgress');
  progress.style.display = 'block';
  progress.textContent = '⚡ Optimizing photo...';

  // Apply on-device HTML5 canvas compression
  activeCompressedFile = await compressImage(file);
  const originalSize = (file.size / 1024).toFixed(1);
  const newSize = (activeCompressedFile.size / 1024).toFixed(1);

  // Render direct image preview
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('imgPreview');
    preview.src = e.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(activeCompressedFile);

  progress.textContent = `Optimized image (${originalSize} KB ➡️ ${newSize} KB). Uploading…`;

  try {
    const formData = new FormData();
    formData.append('file', activeCompressedFile);
    const res = await fetch(`${API}/upload/image`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: formData
    });
    if (!res.ok) throw new Error('Upload failed');
    const data = await res.json();
    uploadedImageUrl = data.url;
    uploadedPublicId = data.public_id;
    progress.textContent = `✅ Upload complete! Saved ${Math.round(100 - (newSize/originalSize * 100))}% storage cost.`;
    setTimeout(() => progress.style.display = 'none', 3000);
  } catch (e) {
    progress.textContent = '❌ Upload failed. Try again.';
    showToast('Image upload failed', true);
  }
}

/* ===== SAVE PRODUCT ===== */
window.saveProduct = async function() {
  const name = document.getElementById('pName').value.trim();
  const variant = document.getElementById('pVariant').value.trim();
  const price = document.getElementById('pPrice').value;
  const oldPrice = document.getElementById('pOldPrice').value;
  const categoryId = document.getElementById('pCategory').value;
  const badge = document.getElementById('pBadge').value;
  const editId = document.getElementById('editId').value;

  if (!name || !price || !categoryId) {
    showToast('Name, price and category are required', true);
    return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'SAVING…';

  const payload = {
    name,
    variant: variant || null,
    price: parseFloat(price),
    old_price: oldPrice ? parseFloat(oldPrice) : null,
    category_id: parseInt(categoryId),
    badge: badge || null,
    image_url: uploadedImageUrl || null,
    cloudinary_id: uploadedPublicId || null,
    in_stock: true
  };

  try {
    let res;
    if (editId) {
      res = await fetch(`${API}/products/${editId}`, {
        method: 'PUT',
        headers,
        body: JSON.stringify(payload)
      });
    } else {
      res = await fetch(`${API}/products`, {
        method: 'POST',
        headers,
        body: JSON.stringify(payload)
      });
    }
    if (!res.ok) throw new Error('Save failed');
    showToast(editId ? 'Product updated!' : 'Product added!');
    clearForm();
    await loadProducts();
  } catch (e) {
    showToast('Failed to save product', true);
  }

  btn.disabled = false;
  btn.textContent = 'SAVE PRODUCT';
}

/* ===== EDIT ===== */
window.editProduct = function(id) {
  const p = allProducts.find(p => p.id === id);
  if (!p) return;
  document.getElementById('editId').value = p.id;
  document.getElementById('formTitle').textContent = 'EDIT PRODUCT';
  document.getElementById('pName').value = p.name;
  document.getElementById('pVariant').value = p.variant || '';
  document.getElementById('pPrice').value = p.price;
  document.getElementById('pOldPrice').value = p.old_price || '';
  document.getElementById('pCategory').value = p.category_id || '';
  document.getElementById('pBadge').value = p.badge || '';
  if (p.image_url) {
    const preview = document.getElementById('imgPreview');
    preview.src = p.image_url;
    preview.style.display = 'block';
    uploadedImageUrl = p.image_url;
    uploadedPublicId = p.cloudinary_id || '';
  }
  document.getElementById('saveBtn').textContent = 'UPDATE PRODUCT';
  document.getElementById('cancelBtn').style.display = 'block';
  document.querySelectorAll('.product-row').forEach(r => r.classList.remove('editing'));
  document.getElementById(`row-${id}`)?.classList.add('editing');
  document.querySelector('.form-panel').scrollTo({ top: 0, behavior: 'smooth' });
}

/* ===== DELETE ===== */
window.deleteProduct = async function(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    const res = await fetch(`${API}/products/${id}`, { method: 'DELETE', headers });
    if (!res.ok) throw new Error('Delete failed');
    showToast('Product deleted');
    await loadProducts();
  } catch (e) { showToast('Failed to delete product', true); }
}

/* ===== TOGGLE STOCK ===== */
window.toggleStock = async function(id, currentStatus) {
  try {
    await fetch(`${API}/products/${id}/stock`, { method: 'PATCH', headers });
    showToast(currentStatus ? 'Marked as out of stock' : 'Marked as in stock');
    await loadProducts();
  } catch (e) { showToast('Failed to update stock', true); }
}

/* ===== CLEAR FORM ===== */
window.clearForm = function() {
  document.getElementById('editId').value = '';
  document.getElementById('formTitle').textContent = 'ADD PRODUCT';
  document.getElementById('pName').value = '';
  document.getElementById('pVariant').value = '';
  document.getElementById('pPrice').value = '';
  document.getElementById('pOldPrice').value = '';
  document.getElementById('pCategory').value = '';
  document.getElementById('pBadge').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgFile').value = '';
  document.getElementById('saveBtn').textContent = 'SAVE PRODUCT';
  document.getElementById('cancelBtn').style.display = 'none';
  uploadedImageUrl = '';
  uploadedPublicId = '';
  activeCompressedFile = null;
  document.querySelectorAll('.product-row').forEach(r => r.classList.remove('editing'));
}

/* ===== TOAST ===== */
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast${isError ? ' error' : ''} show`;
  setTimeout(() => t.className = `toast${isError ? ' error' : ''}`, 3000);
}

window.logout = function() {
  localStorage.removeItem('cs_token');
  window.location.href = 'login.html';
}

init();
</script>
</body>
</html>
