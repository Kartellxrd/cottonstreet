<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotton Street — Manage Products</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f2ee;
    --accent: #c8a96e;
    --accent2: #e63946;
    --grey: #1a1a1a;
    --mid: #2a2a2a;
    --light: #888;
    --green: #25D366;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* SIDEBAR */
  aside {
    width: 260px;
    background: var(--grey);
    border-right: 1px solid rgba(200,169,110,0.15);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: fixed;
    top: 0; bottom: 0; left: 0;
    z-index: 100;
    transition: transform 0.3s ease;
  }
  .sidebar-top { padding: 24px 20px; }
  .brand { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--white); margin-bottom: 32px; }
  .brand span { color: var(--accent); }
  
  .nav-menu { display: flex; flex-direction: column; gap: 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; color: var(--light); text-decoration: none;
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px;
    border-radius: 4px; transition: 0.2s;
  }
  .nav-item:hover, .nav-item.active { background: var(--accent); color: var(--black); font-weight: bold; }
  
  .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
  .brand-card {
    background: var(--black); border: 1px solid rgba(200,169,110,0.2);
    padding: 16px; text-align: center; border-radius: 6px;
  }
  .brand-card img { width: 40px; margin-bottom: 8px; }
  .brand-card h4 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); letter-spacing: 1px; }
  .brand-card p { font-size: 10px; color: var(--light); margin-top: 2px; }

  /* TOP HEADER BAR */
  header {
    margin-left: 260px;
    background: var(--grey) !important;
    border-bottom: 1px solid rgba(200, 169, 110, 0.2) !important;
    padding: 14px 32px !important;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 90;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .nav-left-group, .nav-right-group {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .menu-toggle {
    display: none;
    background: var(--mid);
    border: 1px solid rgba(200, 169, 110, 0.3);
    color: var(--accent);
    width: 36px; height: 36px;
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }
  .menu-toggle:hover {
    background: var(--accent);
    color: var(--black);
  }

  .nav-brand-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-location-badge {
    background: rgba(200, 169, 110, 0.1);
    border: 1px solid rgba(200, 169, 110, 0.3);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  .nav-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--light);
  }

  /* Live Status Pill */
  .live-status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(37, 211, 102, 0.08);
    border: 1px solid rgba(37, 211, 102, 0.25);
    padding: 5px 12px;
    border-radius: 20px;
  }

  .pulse-dot {
    width: 7px;
    height: 7px;
    background-color: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: pulse-animation 2s infinite;
  }

  @keyframes pulse-animation {
    0% { transform: scale(0.95); opacity: 0.8; }
    50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 12px var(--green); }
    100% { transform: scale(0.95); opacity: 0.8; }
  }

  .status-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--green);
    font-weight: 700;
  }

  /* Styled Logout Button */
  .logout-btn {
    background: rgba(230, 57, 70, 0.12);
    border: 1px solid rgba(230, 57, 70, 0.4);
    color: var(--accent2);
    padding: 7px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s ease;
  }

  .logout-btn:hover {
    background: var(--accent2);
    color: var(--white);
    box-shadow: 0 0 12px rgba(230, 57, 70, 0.4);
  }

  /* APP SHELL & WORKSPACE */
  .app-shell { display: flex; min-height: calc(100vh - 69px); margin-left: 260px; }
  .container { display: flex; flex: 1; height: calc(100vh - 69px); overflow: hidden; width: 100%; }
  
  /* FORM PANEL */
  .form-panel {
    width: 380px;
    background: var(--grey);
    border-right: 1px solid rgba(200,169,110,0.1);
    padding: 32px;
    overflow-y: auto;
    height: 100%;
  }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: var(--accent); margin-bottom: 24px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--light); margin-bottom: 8px; }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--black);
    border: 1px solid var(--mid);
    color: var(--white);
    padding: 12px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: 0.3s;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  
  /* PHOTO UPLOAD BOX */
  .photo-upload-box {
    border: 2px dashed var(--mid);
    background: var(--black);
    padding: 24px;
    text-align: center;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
  }
  .photo-upload-box:hover { border-color: var(--accent); }
  .photo-upload-box span { display: block; font-size: 24px; margin-bottom: 8px; }
  .photo-upload-box p { font-size: 12px; color: var(--light); }
  #imgPreview { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; margin-top: 12px; display: none; }
  .upload-progress { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 8px; display: none; }

  /* LIST PANEL */
  .list-panel { flex: 1; padding: 40px; overflow-y: auto; height: 100%; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .panel-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }
  .panel-title span { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--light); margin-left: 12px; }
  .search-bar { width: 300px; position: relative; }
  .search-bar input { width: 100%; background: var(--grey); border: 1px solid var(--mid); padding: 10px 16px; color: var(--white); font-size: 14px; border-radius: 4px; }
  .search-bar input:focus { outline: none; border-color: var(--accent); }

  /* PRODUCT ROW */
  .product-list { display: flex; flex-direction: column; gap: 12px; }
  .product-row {
    background: var(--grey);
    border: 1px solid rgba(255,255,255,0.02);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-radius: 4px;
    transition: 0.3s;
  }
  .product-row:hover { border-color: rgba(200,169,110,0.2); }
  .product-row.editing { border-color: var(--accent); background: rgba(200,169,110,0.02); }
  .product-thumb { width: 48px; height: 48px; border-radius: 4px; background: var(--black); display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: 'Space Mono', monospace; font-size: 14px; color: var(--accent); flex-shrink: 0; }
  .product-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .product-info { flex: 1; }
  .product-name { font-weight: 500; font-size: 16px; margin-bottom: 4px; }
  .product-meta { font-size: 12px; color: var(--light); }
  .product-price { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent); font-weight: bold; margin-top: 4px; }
  
  .product-actions { display: flex; gap: 8px; align-items: center; }
  .product-actions button { border: none; padding: 8px 16px; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.3s; }
  .btn-edit { background: var(--mid); color: var(--white); }
  .btn-edit:hover { background: #3a3a3a; }
  .btn-delete { background: rgba(230,57,70,0.1); color: var(--accent2); }
  .btn-delete:hover { background: var(--accent2); color: var(--white); }
  .stock-toggle { background: var(--black); border: 1px solid var(--mid) !important; font-size: 14px; width: 36px; padding: 0 !important; display: flex; align-items: center; justify-content: center; cursor: pointer; }

  /* SAVE BUTTON */
  .btn-save { width: 100%; background: var(--accent); color: var(--black); border: none; padding: 14px; border-radius: 4px; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
  .btn-save:hover { background: #bda066; }
  .btn-save:disabled { background: var(--mid); color: var(--light); cursor: not-allowed; }

  /* TOAST */
  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--grey); border: 1px solid var(--accent); color: var(--white); padding: 16px 24px; border-radius: 4px; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; transform: translateY(20px); transition: 0.3s; pointer-events: none; z-index: 1000; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--accent2); }

  /* MOBILE BACKDROP OVERLAY */
  .sidebar-backdrop {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 95;
  }
  .sidebar-backdrop.active { display: block; }

  @media (max-width: 768px) {
    aside { transform: translateX(-100%); }
    aside.open { transform: translateX(0); }
    header, .app-shell { margin-left: 0; }
    .menu-toggle { display: flex; }
    header { padding: 12px 16px !important; }
    .nav-title { display: none; }
    .container { flex-direction: column; height: auto; }
    .form-panel, .list-panel { width: 100%; height: auto; }
  }
</style>
</head>
<body>

<!-- DYNAMIC NAVBAR CONTAINER (Loaded via components/navbar.html) -->
<header id="navbar-container"></header>

<div class="app-shell">
  <!-- DYNAMIC SIDEBAR CONTAINER (Loaded via components/sidebar.html) -->
  <aside id="sidebar-container"></aside>

  <div class="container">
    <div class="form-panel">
      <div class="form-title" id="formTitle">ADD PRODUCT</div>
      <input type="hidden" id="editId">
      
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="pName" placeholder="e.g. Nike Air Max 95">
      </div>

      <div class="form-group">
        <label>Variant / Description</label>
        <input type="text" id="pVariant" placeholder="e.g. Black · All Sizes on Order">
      </div>

      <div class="form-group">
        <label>Price (BWP)</label>
        <input type="number" id="pPrice" placeholder="e.g. 1850">
      </div>

      <div class="form-group">
        <label>Old Price (BWP - Optional)</label>
        <input type="number" id="pOldPrice" placeholder="e.g. 2400">
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="pCategory">
          <option value="">Select category…</option>
        </select>
      </div>

      <div class="form-group">
        <label>Promo Badge (Optional)</label>
        <select id="pBadge">
          <option value="">None</option>
          <option value="NEW">NEW</option>
          <option value="HOT">HOT</option>
          <option value="SALE">SALE</option>
          <option value="TRENDING">TRENDING</option>
          <option value="BESTSELLER">BESTSELLER</option>
        </select>
      </div>

      <div class="form-group">
        <label>Product Image</label>
        <div class="photo-upload-box" id="uploadArea">
          <span>📸</span>
          <p>Drag & drop image here or click to browse</p>
          <img id="imgPreview" alt="Upload preview">
          <div class="upload-progress" id="uploadProgress">Uploading…</div>
        </div>
        <input type="file" id="imgFile" accept="image/*" style="display: none;" onchange="handleImageSelect(this)">
      </div>

      <button class="btn-save" id="saveBtn" onclick="saveProduct()">SAVE PRODUCT</button>
      <button class="btn-edit" id="cancelBtn" style="width: 100%; margin-top: 10px; padding: 12px; font-family: 'Space Mono', monospace; font-size: 12px; display: none;" onclick="clearForm()">CANCEL</button>
    </div>

    <div class="list-panel">
      <div class="panel-header">
        <div class="panel-title">ALL PRODUCTS <span id="productCount">0 products</span></div>
        <div class="search-bar">
          <input type="text" placeholder="Search by name or info…" oninput="searchProducts(this.value)">
        </div>
      </div>

      <div class="product-list" id="productList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Product added successfully</div>

<script type="module">
  import { loadAdminComponents } from '../js/admin/components-loader.js';
  loadAdminComponents();
</script>

<script type="module">
  import { initProductsPanel } from '../js/admin/products-form.js';
  initProductsPanel();
</script>
</body>
</html>
