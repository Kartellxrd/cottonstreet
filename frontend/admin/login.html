<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotton Street — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f2ee;
    --accent: #c8a96e;
    --accent2: #e63946;
    --grey: #1a1a1a;
    --light: #888;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }
  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 36px;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 8px;
  }
  .logo span { color: var(--accent); }
  .sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--light);
    text-align: center;
    margin-bottom: 48px;
  }
  .card {
    background: var(--grey);
    border: 1px solid rgba(200,169,110,0.2);
    padding: 40px 36px;
  }
  .card-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 28px;
  }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    background: var(--accent);
    color: var(--black);
    border: none;
    padding: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .btn:hover { background: var(--white); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    background: rgba(230,57,70,0.15);
    border: 1px solid rgba(230,57,70,0.3);
    color: #e63946;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">Cotton<span>Street</span></div>
  <div class="sub">Admin Panel</div>
  <div class="card">
    <div class="card-title">SIGN IN</div>
    <div class="error" id="error"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@cottonstreet.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" id="loginBtn" onclick="login()">LOGIN TO ADMIN</button>
  </div>
</div>
<script>
const API = (() => {
  const host = window.location.hostname;

  // 1. If we are on the live Vercel app, use the production Render URL
  if (host !== 'localhost' && host !== '127.0.0.1' && !host.includes('.app.github.dev')) {
    return 'https://cottonstreet-3.onrender.com/api';
  }

  // 2. Check for Codespace preview links
  if (host.includes('.app.github.dev')) {
    return `${window.location.protocol}//${host.replace(/-\d+\.app\.github\.dev$/, '-8000.app.github.dev')}/api`;
  }

  // 3. Fallback for local development
  return 'http://localhost:8000/api';
})();

// Redirect if already logged in
if (localStorage.getItem('cs_token')) window.location.href = 'products.html';

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('error');
  
  err.style.display = 'none';
  if (!email || !password) { showError('Please fill in all fields'); return; }
  
  btn.disabled = true;
  btn.textContent = 'SIGNING IN...';
  
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');
    
    localStorage.setItem('cs_token', data.access_token);
    window.location.href = 'index.html';
  } catch (e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = 'LOGIN TO ADMIN';
  }
}

function showError(msg) {
  const err = document.getElementById('error');
  err.textContent = msg;
  err.style.display = 'block';
}
</script>
</body>
</html>
