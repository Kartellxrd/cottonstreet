<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotton Street — Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f2ee;
    --accent: #c8a96e;
    --accent2: #e63946;
    --grey: #1a1a1a;
    --mid: #2a2a2a;
    --light: #888;
    --green: #25D366;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* SIDEBAR */
  aside {
    width: 260px;
    background: var(--grey);
    border-right: 1px solid rgba(200,169,110,0.15);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: fixed;
    top: 69px; bottom: 0; left: 0;
    z-index: 100;
    transition: transform 0.3s ease;
  }
  .sidebar-top { padding: 24px 20px; }
  .brand { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--white); margin-bottom: 32px; }
  .brand span { color: var(--accent); }
  
  .nav-menu { display: flex; flex-direction: column; gap: 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; color: var(--light); text-decoration: none;
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px;
    border-radius: 4px; transition: 0.2s;
  }
  .nav-item:hover, .nav-item.active { background: var(--accent); color: var(--black); font-weight: bold; }
  
  .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
  .brand-card {
    background: var(--black); border: 1px solid rgba(200,169,110,0.2);
    padding: 16px; text-align: center; border-radius: 6px;
  }
  .brand-card img { width: 40px; margin-bottom: 8px; }
  .brand-card h4 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); letter-spacing: 1px; }
  .brand-card p { font-size: 10px; color: var(--light); margin-top: 2px; }

  /* TOP HEADER BAR */
  header {
    width: 100%;
    background: var(--grey) !important;
    border-bottom: 1px solid rgba(200, 169, 110, 0.2) !important;
    padding: 14px 32px !important;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0; left: 0;
    z-index: 110;
    height: 69px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .nav-left-group, .nav-right-group {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .menu-toggle {
    display: none;
    background: var(--mid);
    border: 1px solid rgba(200, 169, 110, 0.3);
    color: var(--accent);
    width: 36px; height: 36px;
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }
  .menu-toggle:hover {
    background: var(--accent);
    color: var(--black);
  }

  .nav-brand-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-location-badge {
    background: rgba(200, 169, 110, 0.1);
    border: 1px solid rgba(200, 169, 110, 0.3);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  .nav-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--light);
  }

  /* Live Status Pill */
  .live-status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(37, 211, 102, 0.08);
    border: 1px solid rgba(37, 211, 102, 0.25);
    padding: 5px 12px;
    border-radius: 20px;
  }

  .pulse-dot {
    width: 7px;
    height: 7px;
    background-color: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: pulse-animation 2s infinite;
  }

  @keyframes pulse-animation {
    0% { transform: scale(0.95); opacity: 0.8; }
    50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 12px var(--green); }
    100% { transform: scale(0.95); opacity: 0.8; }
  }

  .status-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--green);
    font-weight: 700;
  }

  /* Styled Logout Button */
  .logout-btn {
    background: rgba(230, 57, 70, 0.12);
    border: 1px solid rgba(230, 57, 70, 0.4);
    color: var(--accent2);
    padding: 7px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s ease;
  }

  .logout-btn:hover {
    background: var(--accent2);
    color: var(--white);
    box-shadow: 0 0 12px rgba(230, 57, 70, 0.4);
  }

  /* APP SHELL & WORKSPACE */
  .app-shell { 
    display: flex; 
    margin-top: 69px; 
    margin-left: 260px; 
    min-height: calc(100vh - 69px); 
  }
  .page-container { 
    flex: 1; 
    padding: 40px; 
    overflow-y: auto; 
    max-height: calc(100vh - 69px); 
  }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--grey);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 20px 24px;
    border-radius: 4px;
  }
  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 8px;
  }
  .stat-num {
    font-family: 'Bebas Neue', cursive;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }

  /* FILTERS */
  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--light);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    color: var(--black);
    border-color: var(--accent);
    font-weight: bold;
  }

  /* ORDER CARDS */
  .orders-list { display: flex; flex-direction: column; gap: 12px; }
  .order-card {
    background: var(--grey);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 20px 24px;
    border-radius: 4px;
    transition: border-color 0.2s;
  }
  .order-card:hover { border-color: rgba(200,169,110,0.3); }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 16px; }
  .order-id, .order-date { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--light); }
  .order-customer { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .order-contact { font-size: 13px; color: var(--light); }
  .order-items {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 12px 16px;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--light);
    border-radius: 4px;
  }
  .order-items strong { color: var(--white); }
  .order-bottom { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
  .order-total { font-family: 'Space Mono', monospace; font-size: 16px; color: var(--accent); font-weight: 700; }
  .order-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .status-badge {
    padding: 5px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
    border-radius: 4px;
  }
  .status-pending { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid rgba(200,169,110,0.3); }
  .status-confirmed, .status-delivered { background: rgba(37,211,102,0.15); color: #25D366; border: 1px solid rgba(37,211,102,0.3); }
  .status-cancelled { background: rgba(230,57,70,0.1); color: var(--accent2); border: 1px solid rgba(230,57,70,0.2); }

  .status-select {
    background: var(--mid);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    padding: 7px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    outline: none;
    cursor: pointer;
    border-radius: 4px;
  }
  .status-select option { background: var(--grey); }

  .btn-wa {
    background: rgba(37,211,102,0.15);
    border: 1px solid rgba(37,211,102,0.3);
    color: #25D366;
    padding: 7px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .btn-wa:hover { background: rgba(37,211,102,0.25); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--light); font-family: 'Space Mono', monospace; font-size: 12px; }

  .toast { 
    position: fixed; bottom: 32px; right: 32px; 
    background: var(--grey); border: 1px solid var(--accent); 
    color: var(--white); padding: 16px 24px; border-radius: 4px; 
    font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    opacity: 0; transform: translateY(20px); transition: 0.3s; 
    pointer-events: none; z-index: 1000; 
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* MOBILE BACKDROP OVERLAY */
  .sidebar-backdrop {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 95;
  }
  .sidebar-backdrop.active { display: block; }

  @media (max-width: 768px) {
    aside { transform: translateX(-100%); top: 0; }
    aside.open { transform: translateX(0); }
    header, .app-shell { margin-left: 0; }
    .menu-toggle { display: flex; }
    header { padding: 12px 16px !important; }
    .nav-title { display: none; }
    .page-container { padding: 20px; }
    .stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- DYNAMIC NAVBAR CONTAINER -->
<header id="navbar-container"></header>

<div class="app-shell">
  <!-- DYNAMIC SIDEBAR CONTAINER -->
  <aside id="sidebar-container"></aside>

  <div class="page-container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-num" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-num" id="statPending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Confirmed</div>
        <div class="stat-num" id="statConfirmed">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Delivered</div>
        <div class="stat-num" id="statDelivered">0</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterOrders('all', this)">All</button>
      <button class="filter-btn" onclick="filterOrders('pending', this)">Pending</button>
      <button class="filter-btn" onclick="filterOrders('confirmed', this)">Confirmed</button>
      <button class="filter-btn" onclick="filterOrders('delivered', this)">Delivered</button>
      <button class="filter-btn" onclick="filterOrders('cancelled', this)">Cancelled</button>
    </div>

    <div class="orders-list" id="ordersList">
      <div class="empty-state">Loading orders…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { loadAdminComponents } from '../js/admin/components-loader.js';
  loadAdminComponents();
</script>

<script type="module">
  import { initOrdersPanel } from '../js/admin/orders-control.js';
  initOrdersPanel();
</script>
</body>
</html>
