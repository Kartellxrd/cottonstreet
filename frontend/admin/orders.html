<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotton Street — Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f2ee;
    --accent: #c8a96e;
    --accent2: #e63946;
    --grey: #1a1a1a;
    --mid: #2a2a2a;
    --light: #888;
    --green: #25D366;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; }
  /* Add to products.html & orders.html style blocks */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
    height: auto;
  }
  .form-panel {
    width: 100%;
    height: auto;
    max-height: none;
    border-right: none;
    border-bottom: 1px solid rgba(200,169,110,0.1);
  }
  .list-panel {
    height: auto;
    padding: 20px;
  }
  nav {
    padding: 12px 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .search-bar {
    width: 100%;
  }
  .product-row {
    flex-direction: column;
    align-items: flex-start;
  }
  .product-actions {
    width: 100%;
    justify-content: space-between;
    margin-top: 10px;
  }
  .stats {
    grid-template-columns: 1fr 1fr;
  }
}

  nav {
    background: var(--grey);
    border-bottom: 1px solid rgba(200,169,110,0.15);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 3px; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 8px; }
  .nav-link {
    padding: 8px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--light);
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .nav-link:hover, .nav-link.active { color: var(--accent); border-color: rgba(200,169,110,0.3); }
  .logout-btn {
    background: none;
    border: 1px solid rgba(230,57,70,0.3);
    color: var(--accent2);
    padding: 8px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { background: rgba(230,57,70,0.1); }

  .page { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--grey);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 20px 24px;
  }
  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 8px;
  }
  .stat-num {
    font-family: 'Bebas Neue', cursive;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    color: var(--black);
    border-color: var(--accent);
  }

  /* ORDER CARDS */
  .orders-list { display: flex; flex-direction: column; gap: 12px; }
  .order-card {
    background: var(--grey);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 20px 24px;
    transition: border-color 0.2s;
  }
  .order-card:hover { border-color: rgba(200,169,110,0.3); }
  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    gap: 16px;
  }
  .order-id {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--light);
  }
  .order-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--light);
    white-space: nowrap;
  }
  .order-customer { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .order-contact { font-size: 13px; color: var(--light); }
  .order-items {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 12px 16px;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--light);
  }
  .order-items strong { color: var(--white); }
  .order-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .order-total {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    font-weight: 700;
  }
  .order-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .status-badge {
    padding: 5px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .status-pending { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid rgba(200,169,110,0.3); }
  .status-confirmed { background: rgba(37,211,102,0.15); color: #25D366; border: 1px solid rgba(37,211,102,0.3); }
  .status-delivered { background: rgba(37,211,102,0.25); color: #25D366; border: 1px solid rgba(37,211,102,0.5); }
  .status-cancelled { background: rgba(230,57,70,0.1); color: var(--accent2); border: 1px solid rgba(230,57,70,0.2); }

  .status-select {
    background: var(--mid);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    padding: 7px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    outline: none;
    cursor: pointer;
  }
  .status-select option { background: var(--grey); }

  .btn-wa {
    background: rgba(37,211,102,0.15);
    border: 1px solid rgba(37,211,102,0.3);
    color: #25D366;
    padding: 7px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
  }
  .btn-wa:hover { background: rgba(37,211,102,0.25); }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--light);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: var(--black);
    padding: 12px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: 700;
    z-index: 9000;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .page { padding: 16px; }
    .stats { grid-template-columns: 1fr 1fr; }
    nav { padding: 12px 16px; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Cotton<span>Street</span> <span style="font-size:13px;color:var(--light);letter-spacing:1px;">ADMIN</span></div>
  <div class="nav-links">
    <a href="products.html" class="nav-link">Products</a>
    <a href="orders.html" class="nav-link active">Orders</a>
  </div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<div class="page">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Orders</div>
      <div class="stat-num" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-num" id="statPending">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Confirmed</div>
      <div class="stat-num" id="statConfirmed">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Delivered</div>
      <div class="stat-num" id="statDelivered">0</div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterOrders('all', this)">All</button>
    <button class="filter-btn" onclick="filterOrders('pending', this)">Pending</button>
    <button class="filter-btn" onclick="filterOrders('confirmed', this)">Confirmed</button>
    <button class="filter-btn" onclick="filterOrders('delivered', this)">Delivered</button>
    <button class="filter-btn" onclick="filterOrders('cancelled', this)">Cancelled</button>
  </div>

  <div class="orders-list" id="ordersList">
    <div class="empty-state">Loading orders…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initOrdersPanel } from '../js/admin/orders-control.js';
  
  window.logout = function() {
    localStorage.removeItem('cs_token');
    window.location.href = 'login.html';
  }
  
  initOrdersPanel();
</script>
</body>
</html>
