<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotton Street — Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f2ee;
    --accent: #c8a96e;
    --accent2: #e63946;
    --grey: #1a1a1a;
    --mid: #2a2a2a;
    --light: #888;
    --green: #25D366;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* TOP NAVBAR */
  nav, header#navbar-container {
    background: var(--grey);
    border-bottom: 1px solid rgba(200,169,110,0.15);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-brand { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--white); }
  .nav-brand span { color: var(--accent); }
  .nav-links-top { display: flex; gap: 24px; align-items: center; }
  .btn-logout { background: none; border: 1px solid rgba(230,57,70,0.3); color: var(--accent2); padding: 6px 14px; font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
  .btn-logout:hover { background: rgba(230,57,70,0.1); border-color: var(--accent2); }

  /* APP SHELL LAYOUT */
  .app-shell { display: flex; min-height: calc(100vh - 69px); }

  /* SIDEBAR NAVIGATION */
  #sidebar, #sidebar-container {
    width: 260px;
    background: var(--grey);
    border-right: 1px solid rgba(200,169,110,0.1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-shrink: 0;
    height: calc(100vh - 69px);
    position: sticky;
    top: 69px;
  }
  .sidebar-top { padding: 24px 0; }
  .sidebar-top .brand { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; padding: 0 24px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--light); }
  .sidebar-top .brand span { color: var(--accent); }
  .nav-menu { display: flex; flex-direction: column; gap: 4px; padding: 16px; }
  .nav-item {
    padding: 12px 16px;
    color: var(--light);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    border-radius: 4px;
    transition: 0.2s;
  }
  .nav-item:hover, .nav-item.active { background: rgba(200,169,110,0.08); color: var(--accent); }
  .sidebar-footer { padding: 20px 24px; border-top: 1px solid rgba(255,255,255,0.05); }
  .brand-card h4 { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--white); margin-bottom: 2px; }
  .brand-card p { font-size: 11px; color: var(--light); }

  /* WORKSPACE CONTAINER */
  .page-container { flex: 1; padding: 32px; overflow-y: auto; height: calc(100vh - 69px); max-width: 1200px; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--grey);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 20px 24px;
    border-radius: 4px;
  }
  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 8px;
  }
  .stat-num {
    font-family: 'Bebas Neue', cursive;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }

  /* FILTERS */
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--light);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    color: var(--black);
    border-color: var(--accent);
  }

  /* ORDER CARDS */
  .orders-list { display: flex; flex-direction: column; gap: 12px; }
  .order-card {
    background: var(--grey);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 20px 24px;
    border-radius: 4px;
    transition: border-color 0.2s;
  }
  .order-card:hover { border-color: rgba(200,169,110,0.3); }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 16px; }
  .order-id, .order-date { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--light); }
  .order-customer { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .order-contact { font-size: 13px; color: var(--light); }
  .order-items {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 12px 16px;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--light);
    border-radius: 4px;
  }
  .order-items strong { color: var(--white); }
  .order-bottom { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
  .order-total { font-family: 'Space Mono', monospace; font-size: 16px; color: var(--accent); font-weight: 700; }
  .order-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .status-badge {
    padding: 5px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
    border-radius: 4px;
  }
  .status-pending { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid rgba(200,169,110,0.3); }
  .status-confirmed, .status-delivered { background: rgba(37,211,102,0.15); color: #25D366; border: 1px solid rgba(37,211,102,0.3); }
  .status-cancelled { background: rgba(230,57,70,0.1); color: var(--accent2); border: 1px solid rgba(230,57,70,0.2); }

  .status-select {
    background: var(--mid);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    padding: 7px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    outline: none;
    cursor: pointer;
    border-radius: 4px;
  }
  .status-select option { background: var(--grey); }

  .btn-wa {
    background: rgba(37,211,102,0.15);
    border: 1px solid rgba(37,211,102,0.3);
    color: #25D366;
    padding: 7px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .btn-wa:hover { background: rgba(37,211,102,0.25); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--light); font-family: 'Space Mono', monospace; font-size: 12px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: var(--black);
    padding: 12px 24px; font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 2px; font-weight: 700;
    z-index: 9000; transition: transform 0.3s; white-space: nowrap;
    border-radius: 4px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .page-container { padding: 16px; }
    .stats { grid-template-columns: 1fr 1fr; }
    #sidebar, #sidebar-container { display: none; }
  }
</style>
</head>
<body>

<!-- TOP NAVBAR CONTAINER -->
<header id="navbar-container"></header>

<div class="app-shell">
  <!-- SIDEBAR CONTAINER -->
  <aside id="sidebar-container"></aside>

  <div class="page-container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-num" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-num" id="statPending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Confirmed</div>
        <div class="stat-num" id="statConfirmed">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Delivered</div>
        <div class="stat-num" id="statDelivered">0</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterOrders('all', this)">All</button>
      <button class="filter-btn" onclick="filterOrders('pending', this)">Pending</button>
      <button class="filter-btn" onclick="filterOrders('confirmed', this)">Confirmed</button>
      <button class="filter-btn" onclick="filterOrders('delivered', this)">Delivered</button>
      <button class="filter-btn" onclick="filterOrders('cancelled', this)">Cancelled</button>
    </div>

    <div class="orders-list" id="ordersList">
      <div class="empty-state">Loading orders…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  window.logout = function() {
    localStorage.removeItem('cs_token');
    window.location.href = 'login.html';
  };

  // Component Loader Script
  async function loadComponent(containerId, filePath) {
    const container = document.getElementById(containerId);
    if (!container) return;
    try {
      const response = await fetch(filePath);
      if (response.ok) {
        container.innerHTML = await response.text();
        
        // Auto-highlight active sidebar item
        if (containerId === 'sidebar-container') {
          const currentFileName = window.location.pathname.split('/').pop() || 'index.html';
          const activeLink = container.querySelector(`a[href="${currentFileName}"]`);
          if (activeLink) {
            container.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            activeLink.classList.add('active');
          }
        }
      }
    } catch (error) {
      console.error(`Failed to load component: ${filePath}`, error);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadComponent('navbar-container', 'components/navbar.html');
    loadComponent('sidebar-container', 'components/sidebar.html');
  });
</script>

<script type="module">
  import { initOrdersPanel } from '../js/admin/orders-control.js';
  initOrdersPanel();
</script>
</body>
</html>
